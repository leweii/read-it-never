name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write       # create the GitHub release
  id-token: write       # required by attest-build-provenance
  attestations: write   # write the artifact attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify built version matches the tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$MANIFEST_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create or update release
        # Idempotent: if a release for this tag already exists (e.g. someone
        # ran `gh release create` manually with curated notes), upload the
        # freshly-built+attested artifacts to it instead of failing. The
        # manually-set release notes are preserved.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading attested artifacts."
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated release for $GITHUB_REF_NAME. Build artifacts carry a GitHub artifact attestation." \
              main.js manifest.json styles.css
          fi
